<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lične finansije — Praćenje prihoda i rashoda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>💰 Lične finansije Dragan</h1>
      <p class="subtitle">Praćenje prihoda i rashoda — dnevno, mesečno i godišnje</p>
    </header>

    <main class="main">
      <!-- Forma za dodavanje transakcije -->
      <section class="card section-form">
        <h2>Dodaj transakciju</h2>
        <form id="form-transakcija">
          <div class="form-row">
            <label>
              <span>Tip</span>
              <select id="tip" name="tip" required>
                <option value="prihod">Prihod</option>
                <option value="rashod">Rashod</option>
              </select>
            </label>
            <label>
              <span>Iznos (RSD)</span>
              <input type="number" id="iznos" name="iznos" required min="0" step="0.01" placeholder="npr. 50000">
            </label>
            <label>
              <span>Datum</span>
              <input type="date" id="datum" name="datum" required>
            </label>
          </div>
          <div class="form-row">
            <label class="label-full">
              <span>Kategorija</span>
              <input type="text" id="kategorija" name="kategorija" placeholder="npr. Plata, Hrana, Stanarina...">
            </label>
            <label class="label-full">
              <span>Opis (opciono)</span>
              <input type="text" id="opis" name="opis" placeholder="Kratak opis">
            </label>
          </div>
          <button type="submit" class="btn btn-primary">Dodaj</button>
        </form>
      </section>

      <!-- Filter i pregled -->
      <section class="card section-pregled">
        <h2>Pregled</h2>
        <div class="filter-row">
          <label>
            <span>Mesec</span>
            <select id="filter-mesec"></select>
          </label>
          <label>
            <span>Godina</span>
            <select id="filter-godina"></select>
          </label>
          <label class="view-toggle">
            <span>Prikaz</span>
            <select id="view-mode">
              <option value="dan">Dnevni</option>
              <option value="mesec">Mesečni</option>
              <option value="godina">Godišnji</option>
            </select>
          </label>
          <label class="date-filter" id="label-filter-dan">
            <span>Datum</span>
            <input type="date" id="filter-datum">
          </label>
          <label class="currency-filter">
            <span>Valuta</span>
            <select id="valuta">
              <option value="RSD">Srpski dinar (RSD)</option>
              <option value="EUR">Euro (EUR)</option>
              <option value="USD">Američki dolar (USD)</option>
              <option value="CHF">Švajcarski franak (CHF)</option>
            </select>
          </label>
        </div>

        <!-- Rezime (mesec/godina) -->
        <div class="rezime" id="rezime">
          <div class="rezime-item prihod">
            <span class="label">Ukupno prihodi</span>
            <span class="vrednost" id="ukupno-prihodi">0 RSD</span>
          </div>
          <div class="rezime-item rashod">
            <span class="label">Ukupno rashodi</span>
            <span class="vrednost" id="ukupno-rashodi">0 RSD</span>
          </div>
          <div class="rezime-item bilans">
            <span class="label">Bilans</span>
            <span class="vrednost" id="bilans">0 RSD</span>
          </div>
        </div>

        <!-- Lista transakcija -->
        <div class="transakcije-header">
          <h3>Transakcije</h3>
          <button type="button" class="btn btn-small btn-outline" id="btn-izvezi">Izvezi CSV</button>
        </div>
        <ul class="lista-transakcija" id="lista-transakcija">
          <!-- Popunjava JS -->
        </ul>
        <p class="prazno" id="prazno-poruka">Nema transakcija za izabrani period.</p>
      </section>
    </main>

    <footer class="footer">
      <p>Podaci se čuvaju lokalno u pregledaču. Nema servera.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
